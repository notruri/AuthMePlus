settings:
  enableplugin: true
  prompt_on_join: true
  allow_local_ips: false

messages:
  # General errors
  plugin_disabled: "&cThe premium login system is currently disabled."
  not_authenticated: "&cYou must be logged in (use /login <password>) before using this command."
  no_ip: "&cUnable to retrieve your current IP address."
  unknown_command: "&eUnknown command. Use /premium to see the list."
  not_player: "&cThis command is only available to players."

  # /premium (Help)
  help_header: "&6=== Premium Commands ==="
  help_accept: "&e/premium accept &f- Allow your current IP (automatic bypass)."
  help_revoke: "&e/premium revoke [all|<ip>] &f- Remove one or all IPs from your account."
  help_list: "&e/premium list &f- Show allowed IPs (confirmation required)."
  help_about: "&e/premium about &f- How the plugin works and GDPR compliance."

  # /premium accept
  mojang_check: "&eChecking your account with Mojang..."
  not_premium: "&cThis account is not an official premium account. For security, bypass is denied."
  already_linked: "&aThis IP address is already allowed for bypass."
  premium_link_success: "&aSuccess! Your premium account is now linked to this IP address."

  # /premium revoke
  premium_revoke: "&cBypass has been removed for your current IP."
  premium_revoke_all: "&cAll allowed IP addresses have been removed."
  premium_revoke_specific: "&cThe IP has been removed from the list."
  ip_not_in_list: "&eThis IP address is not in your allowed IPs."

  # /premium list
  list_confirm: "&eAre you sure you want to display your private IPs in chat?"
  list_howto: "&eUse &b/premium list sure&e to continue."
  list_empty: "&eNo IP address is linked to your account."
  list_header: "&aYour allowed IP addresses:"
  list_format: "&b - %ip%"

  # /premium about (GDPR)
  about:
    - "&eThis plugin allows automatic login without a password if"
    - "&eyou play with an official Minecraft account (Premium)."

  # Login events
  auto_login_success: "&aAutomatic login successful - premium account and IP verified!"
  prompt_ip: "&eWould you like to enable passwordless login for this IP?"
  prompt_accept_howto: "&eUse &b/premium accept&e to allow it."
  prompt_revoke_howto: "&eUse &b/premium revoke&e to remove it later."
